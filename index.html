<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library</title>
  <meta name="description" content="A personal reading catalogue">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container">
      <div class="header-content">
        <h1><button id="home-link" class="home-link">My Library</button></h1>
      </div>
      <div id="header-stats"></div>
    </div>
  </header>

  <!-- ─── HOME VIEW ─── -->
  <div id="view-home" class="view">
    <div class="container">

      <div class="home-search-wrap">
        <input
          type="search"
          id="home-search"
          placeholder="Search books, lectures, essays…"
          aria-label="Search all items"
          autocomplete="off"
        >
      </div>

      <div id="home-results" class="home-results hidden" aria-live="polite" aria-label="Search results"></div>

      <nav class="home-nav" id="home-nav" aria-label="Library sections">
        <button class="home-card" id="nav-library" aria-label="Open Library">
          <span class="home-card-eyebrow">Explore</span>
          <span class="home-card-title">Library</span>
          <span class="home-card-sub">Books · Lectures · Podcasts · Essays</span>
          <span id="home-count-library" class="home-card-count"></span>
        </button>
        <button class="home-card" id="nav-want" aria-label="Open Reading List">
          <span class="home-card-eyebrow">Coming up</span>
          <span class="home-card-title">Reading List</span>
          <span class="home-card-sub">Want to Read &amp; Listen</span>
          <span id="home-count-want" class="home-card-count"></span>
        </button>
      </nav>

    </div>
  </div>

  <!-- ─── LIBRARY VIEW ─── -->
  <div id="view-library" class="view hidden">

    <nav class="filters" aria-label="Filter books">
      <div class="container">
        <div class="section-tabs-row">
          <div class="section-tabs" role="tablist" aria-label="Library sections">
            <button class="section-tab active" data-section="books" role="tab" aria-selected="true">Books</button>
            <button class="section-tab" data-section="lectures" role="tab" aria-selected="false">Lectures</button>
            <button class="section-tab" data-section="podcasts" role="tab" aria-selected="false">Podcasts</button>
            <button class="section-tab" data-section="essays" role="tab" aria-selected="false">Essays</button>
          </div>
          <button id="add-item-btn" class="add-item-btn" aria-label="Add podcast or essay">+ Add</button>
        </div>
        <div class="filters-row" id="book-filters">
          <div id="genre-pills" role="group" aria-label="Filter by genre"></div>
          <select id="filter-year" aria-label="Filter by year">
            <option value="">All years</option>
          </select>
          <select id="filter-rating" aria-label="Filter by rating">
            <option value="">All ratings</option>
            <option value="5">★★★★★ only</option>
            <option value="4">★★★★ and above</option>
            <option value="3">★★★ and above</option>
          </select>
          <input
            type="search"
            id="filter-author"
            placeholder="Search author…"
            aria-label="Filter by author"
            autocomplete="off"
          >
          <button id="clear-filters" aria-label="Clear all filters">Clear filters</button>
          <span id="result-count" aria-live="polite"></span>
        </div>
      </div>
    </nav>

    <main id="catalogue" class="container section-panel" aria-label="Book catalogue"></main>
    <main id="lectures-section" class="container section-panel hidden" aria-label="Lectures"></main>
    <main id="podcasts-section" class="container section-panel hidden" aria-label="Podcasts"></main>
    <main id="essays-section" class="container section-panel hidden" aria-label="Essays"></main>

  </div>

  <!-- ─── WANT TO READ/LISTEN VIEW ─── -->
  <div id="view-want" class="view hidden">
    <main id="want-section" class="container" aria-label="Reading list"></main>
  </div>

  <!-- ─── ADD ITEM MODAL ─── -->
  <div id="add-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="add-modal-title">
    <div class="modal-content add-modal-content">
      <button id="add-modal-close" aria-label="Close">&times;</button>
      <div class="add-modal-body">
        <h2 id="add-modal-title" class="add-modal-title">Add to Library</h2>

        <div class="add-field">
          <label for="add-url">Link</label>
          <input type="url" id="add-url" placeholder="Paste a URL…" autocomplete="off">
        </div>

        <div class="add-field add-field-row">
          <div class="add-field">
            <label for="add-type">Type</label>
            <select id="add-type">
              <option value="podcast">Podcast</option>
              <option value="essay">Essay</option>
            </select>
          </div>
          <div class="add-field">
            <label for="add-dest">Add to</label>
            <select id="add-dest">
              <option value="library">Library</option>
              <option value="want">Reading List</option>
            </select>
          </div>
        </div>

        <div class="add-field">
          <label for="add-title">Title</label>
          <input type="text" id="add-title" placeholder="Episode or article title…" autocomplete="off">
        </div>

        <div class="add-field">
          <label for="add-author" id="add-author-label">Author / Show</label>
          <input type="text" id="add-author" placeholder="Author or podcast name…" autocomplete="off">
        </div>

        <div class="add-field add-field-row">
          <div class="add-field">
            <label for="add-year">Year</label>
            <input type="number" id="add-year" placeholder="2026" min="2000" max="2099">
          </div>
        </div>

        <div class="add-field">
          <label for="add-notes">Notes <span class="add-optional">(optional)</span></label>
          <textarea id="add-notes" placeholder="Any thoughts…" rows="3"></textarea>
        </div>

        <button id="add-submit" class="add-submit">Save</button>
      </div>
    </div>
  </div>

  <!-- ─── MODAL ─── -->
  <div
    id="modal"
    class="modal-overlay hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
    <div class="modal-content">
      <button id="modal-close" aria-label="Close">&times;</button>
      <div class="modal-body">
        <div class="modal-cover-wrap">
          <img id="modal-cover" src="" alt="">
        </div>
        <div class="modal-info">
          <span id="modal-genre" class="modal-genre-tag"></span>
          <h2 id="modal-title"></h2>
          <p id="modal-author" class="modal-author"></p>
          <div id="modal-stars" class="modal-stars"></div>
          <p id="modal-year" class="modal-year"></p>
          <div id="modal-review" class="modal-review"></div>
          <a id="modal-link" class="modal-link hidden" href="#" target="_blank" rel="noopener noreferrer"></a>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
